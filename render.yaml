# Render deployment configuration for production
services:
  # Backend API Service
  - type: web
    name: exam-monitoring-backend
    env: node
    plan: starter
    buildCommand: "cd backend && npm install --production"
    startCommand: "cd backend && NODE_ENV=production node server.production.js"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5001
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE
        value: 7d
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
    healthCheckPath: /api/health
    autoDeploy: true
    disk:
      name: exam-monitoring-disk
      sizeGB: 1
    scaling:
      minInstances: 1
      maxInstances: 3
      targetCPUPercent: 70
      targetMemoryPercent: 80

  # Frontend Static Site (Alternative to Vercel)
  - type: web
    name: exam-monitoring-frontend
    env: static
    plan: starter
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://exam-monitoring-backend.onrender.com/api/v1
      - key: VITE_APP_NAME
        value: Exam Monitoring System
      - key: VITE_APP_VERSION
        value: 1.0.0
      - key: VITE_NODE_ENV
        value: production
    pullRequestPreviews:
      enabled: true
      generation: automatic
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-XSS-Protection
        value: "1; mode=block"
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /static/*
        name: Cache-Control
        value: "public, max-age=31536000, immutable"
    redirects:
      - source: /*
        destination: /index.html
        type: 404

# Databases
databases:
  - name: exam-monitoring-db
    plan: starter
    databaseName: exam_monitoring
    user: exam_monitoring_user

# Environment Groups
environmentGroups:
  - name: production
    envVars:
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: ENABLE_METRICS
        value: true
      - key: ENABLE_TRACING
        value: true

  - name: staging
    envVars:
      - key: NODE_ENV
        value: staging
      - key: LOG_LEVEL
        value: debug
      - key: ENABLE_METRICS
        value: false
      - key: ENABLE_TRACING
        value: false

# Notification Rules
notifications:
  - type: email
    enabled: true
    events:
      - deploy.started
      - deploy.succeeded
      - deploy.failed
    recipients:
      - pawankumaryadav7562869762@gmail.com

# Build Optimization
build:
  parallelism: 4
  cache:
    paths:
      - frontend/node_modules
      - backend/node_modules
